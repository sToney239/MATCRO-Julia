# MATCRO Configuration File

[general]
crop_name = "Maize"        # Maize, Rice, Wheat, Soybeans
crop_param = "params/maize.toml"
start_year = 2000
end_year = 2000
start_doy = 1
end_doy = 365
time_step = 3600           # how many seconds in 1 step, normal should be 1 hour [seconds]
co2_ppm_default = 400.0    # fallback CO2 concentration [ppm]
co2_yearly_file = "data/co2/co2.csv"  # optional: CSV with columns year,co2_ppm

# ===== Input: choose ONE mode =====

# Point simulation (CSV weather data)
[point_simulation]
latitude = 40.0            # [degree]
output_directory = "output/"

[point_simulation.weather]
csv_path = "data/forcing.csv"

[point_simulation.management]
planting_doy = 120         # day of year
is_irrigated = 0           # 0 = rainfed, 1 = irrigated
soil_type = 9              # soil texture index (1-13), 9=loam
n_fertilizer = 100.0       # nitrogen fertilizer [kg N/ha]
thermal_time_requirement = 1500.0  # GDH at maturity

# Spatial simulation (comment out [point_simulation] section above to use)

# --- Example: multi-year NetCDF forcing + default management params ---
# [spatial_simulation]
# output_directory = "output/"
#
# [spatial_simulation.weather]
# lon_dim = "lon"           # longitude dimension name in NetCDF
# lat_dim = "lat"           # latitude dimension name in NetCDF
# time_dim = "time"         # time dimension name in NetCDF
