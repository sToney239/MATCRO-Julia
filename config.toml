# MATCRO Configuration File

[time]
start_year = 2000
end_year = 2000
start_doy = 1
end_doy = 365
time_step = 3600           # how many seconds in 1 step, normal should be 1 hour [seconds]

[location]
latitude = 40.0            # [degree]

[crop]
crop_name = "Maize"        # Maize, Rice, Wheat, Soybeans
param_file = "params/maize.toml"
planting_doy = 120         # day of year
is_irrigated = 0           # 0 = rainfed, 1 = irrigated

[soil]
soil_type = 9              # soil texture index (1-13), 9=loam
n_fertilizer = 100.0       # nitrogen fertilizer [kg N/ha]
thermal_time_requirement = 1500.0  # GDH at maturity

[co2]
# If file is provided and exists, it takes priority over fixed_ppm.
# If the file doesn't contain the requested year, fixed_ppm is used as fallback.
fixed_ppm = 400.0          # fallback CO2 concentration [ppm]
file = "data/co2/co2.csv"  # optional: CSV with columns year,co2_ppm

# ===== Input: choose ONE format =====

# CSV input
[input.csv]
path = "data/forcing.csv"

# NetCDF input (comment out [input.csv] section above to use)
# Each variable specifies its own file path (relative to config file location)
# Management params default values go in [input.netcdf.<param_name>] with default_value

# --- Example: single-year NetCDF files ---
# [input.netcdf]
# nthreads = 15             # parallel threads for spatial simulation
# lon_dim = "lon"           # longitude dimension name in NetCDF
# lat_dim = "lat"           # latitude dimension name in NetCDF
# time_dim = "time"         # time dimension name in NetCDF
#
# [input.netcdf.tmx]
# file = "data/netcdf/TMX_2021.nc"
# variable = "tmx"
#
# [input.netcdf.tmn]
# file = "data/netcdf/TMN_2021.nc"
# variable = "tmn"
#
# [input.netcdf.prc]
# file = "data/netcdf/PRC_2021.nc"
# variable = "prc"
#
# [input.netcdf.rsd]
# file = "data/netcdf/RSD_2021.nc"
# variable = "rsd"
#
# [input.netcdf.shm]
# file = "data/netcdf/SHM_2021.nc"
# variable = "shm"
#
# [input.netcdf.wnd]
# file = "data/netcdf/WND_2021.nc"
# variable = "wnd"
# height = 10.0
#
# [input.netcdf.prs]
# file = "data/netcdf/PRS_2021.nc"
# variable = "prs"
#
# # Management parameter defaults (no spatial NC file, use uniform values)
# [input.netcdf.planting_doy]
# default_value = 120
#
# [input.netcdf.is_irrigated]
# default_value = 0
#
# [input.netcdf.soil_type]
# default_value = 9
#
# [input.netcdf.n_fertilizer]
# default_value = 100.0
#
# [input.netcdf.thermal_time_requirement]
# default_value = 1500.0

