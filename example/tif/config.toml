# Example: GeoTIFF management params + NetCDF forcing spatial simulation (3-year)
# Usage: julia src/00_matcro.jl example/tif/config.toml

[general]
crop_name = "Soybean"
crop_param = "params/soybean.toml"
start_year = 2021
end_year = 2023
start_doy = 1
end_doy = 365
time_step = 3600
co2_ppm_default = 415.0
co2_yearly_file = "data/co2.csv"

[spatial_simulation]
output_directory = "output/"

[spatial_simulation.weather]
lon_dim = "lon"
lat_dim = "lat"
time_dim = "time"

# Meteorological forcing (shared with netcdf example, multi-year files 2021-2023)
[spatial_simulation.weather.temperature_max]
file = "../netcdf/data/netcdf/tmx.nc4"
variable = "tmx"

[spatial_simulation.weather.temperature_min]
file = "../netcdf/data/netcdf/tmn.nc4"
variable = "tmn"

[spatial_simulation.weather.precipitation]
file = "../netcdf/data/netcdf/prc.nc4"
variable = "prc"

[spatial_simulation.weather.radiation]
file = "../netcdf/data/netcdf/rsd.nc4"
variable = "rsd"

[spatial_simulation.weather.humidity]
file = "../netcdf/data/netcdf/shm.nc4"
variable = "shm"

[spatial_simulation.weather.wind_speed]
file = "../netcdf/data/netcdf/wnd.nc4"
variable = "wnd"
height = 10.0

[spatial_simulation.weather.pressure]
file = "../netcdf/data/netcdf/prs.nc4"
variable = "prs"

# Management parameters (spatial TIF files + default_value fallback)
[spatial_simulation.management]
[spatial_simulation.management.planting_doy]
default_value = 120
file = "data/tif/planting_doy.tif"

[spatial_simulation.management.is_irrigated]
default_value = 0
file = "data/tif/is_irrigated.tif"

[spatial_simulation.management.soil_type]
default_value = 9
file = "data/tif/soil_type.tif"

[spatial_simulation.management.n_fertilizer]
default_value = 100.0
file = "data/tif/n_fertilizer.tif"

[spatial_simulation.management.thermal_time_requirement]
default_value = 1500.0
file = "data/tif/thermal_time_requirement.tif"

# Boundary filter (optional)
[spatial_simulation.boundary]
file = "../../data/boundaries/cornbelt_states.geojson"
buffer_deg = 0.01