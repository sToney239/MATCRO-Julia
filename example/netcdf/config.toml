# Example: NetCDF spatial simulation (3-year, with management params)
# Usage: julia src/00_matcro.jl example/netcdf/config.toml

[general]
crop_name = "Maize"
crop_param = "params/maize.toml"
start_year = 2021
end_year = 2023
start_doy = 1
end_doy = 365
time_step = 3600
co2_ppm_default = 415.0
co2_yearly_file = "data/co2.csv"

[spatial_simulation]
output_directory = "output/"

[spatial_simulation.weather]
lon_dim = "lon"
lat_dim = "lat"
time_dim = "time"

[spatial_simulation.weather.temperature_max]
file = "data/netcdf/tmx.nc4"
variable = "tmx"

[spatial_simulation.weather.temperature_min]
file = "data/netcdf/tmn.nc4"
variable = "tmn"

[spatial_simulation.weather.precipitation]
file = "data/netcdf/prc.nc4"
variable = "prc"

[spatial_simulation.weather.radiation]
file = "data/netcdf/rsd.nc4"
variable = "rsd"

[spatial_simulation.weather.humidity]
file = "data/netcdf/shm.nc4"
variable = "shm"

[spatial_simulation.weather.wind_speed]
file = "data/netcdf/wnd.nc4"
variable = "wnd"
height = 10.0

[spatial_simulation.weather.pressure]
file = "data/netcdf/prs.nc4"
variable = "prs"

# Management parameters (spatial NC files + default_value fallback)
[spatial_simulation.management]
[spatial_simulation.management.planting_doy]
default_value = 120
file = "data/netcdf/planting_doy.nc"
variable = "planting_doy"

[spatial_simulation.management.is_irrigated]
default_value = 0
file = "data/netcdf/is_irrigated.nc"
variable = "is_irrigated"

[spatial_simulation.management.soil_type]
default_value = 9
file = "data/netcdf/soil_type.nc"
variable = "soil_type"

[spatial_simulation.management.n_fertilizer]
default_value = 100.0
file = "data/netcdf/n_fertilizer.nc"
variable = "n_fertilizer"

[spatial_simulation.management.thermal_time_requirement]
default_value = 1500.0
file = "data/netcdf/thermal_time_requirement.nc"
variable = "thermal_time_requirement"